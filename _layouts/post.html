---
layout: default
---
<article class="post-content">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <nav class="post-nav">
    <a href="/blog/">&larr; Back to Blog</a>
  </nav>
</article>
