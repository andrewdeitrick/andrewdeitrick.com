<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  {% if page.layout == 'post' or page.url contains '/blog' %}
  <link rel="stylesheet" href="/assets/css/blog.css">
  {% endif %}
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Andrew Deitrick",
    "url": "https://andrewdeitrick.com",
    "email": "andrew@andrewdeitrick.com",
    "jobTitle": "Software Engineer & AI Implementation Consultant",
    "description": "{{ site.description | strip_html | strip_newlines | escape }}"
  }
  </script>
</head>
<body>

  {% include nav.html %}

  <!-- Theme Toggle -->
  <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#x23FB;</button>

  <!-- CRT Scanlines -->
  <div class="crt-overlay"></div>

  {{ content }}

  {% include footer.html %}

  <script>
    const toggle = document.querySelector('.theme-toggle');
    const root = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) root.setAttribute('data-theme', saved);

    toggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // TV Channel Surf
    (function() {
      const tv = document.getElementById('tv-container');
      if (!tv) return;

      const photo = document.getElementById('hero-photo');
      const staticEl = document.getElementById('tv-static');
      const channelEl = document.getElementById('tv-channel');
      const tvOff = document.getElementById('tv-off');

      const channels = [
        { src: '/andrew-blue.png' },
        { src: '/assets/characters/pixar.png' },
        { src: '/assets/characters/simpsons.png' },
        { src: '/assets/characters/family-guy.png' },
        { src: '/assets/characters/southpark.png' },
        { src: '/assets/characters/adnime.png' },
        { src: '/assets/characters/peanuts.png' },
        { src: '/assets/characters/dilbert.png' },
      ];

      // Preload all images
      channels.forEach(ch => { const img = new Image(); img.src = ch.src; });

      let current = 0;
      let autoTimer = null;
      let channelTimeout = null;
      let poweredOn = false;

      // Start with screen hidden behind black overlay
      photo.classList.add('hidden');

      function powerOn() {
        photo.classList.remove('hidden');
        tvOff.classList.add('powering-on');
        tvOff.addEventListener('animationend', () => {
          tvOff.classList.add('off');
          poweredOn = true;
          startAuto();
        }, { once: true });
      }

      function changeChannel(index) {
        current = index % channels.length;
        const ch = channels[current];

        // Static flash
        staticEl.classList.remove('active');
        void staticEl.offsetWidth;
        staticEl.classList.add('active');

        // Swap image after brief delay for static effect
        setTimeout(() => { photo.src = ch.src; }, 80);

        // Show channel label
        channelEl.textContent = 'CH ' + (current + 1);
        channelEl.classList.add('visible');
        clearTimeout(channelTimeout);
        channelTimeout = setTimeout(() => channelEl.classList.remove('visible'), 2000);
      }

      function startAuto() {
        autoTimer = setInterval(() => changeChannel(current + 1), 4000);
      }

      function resetAuto() {
        clearInterval(autoTimer);
        startAuto();
      }

      tv.addEventListener('click', () => {
        if (!poweredOn) {
          powerOn();
          return;
        }
        changeChannel(current + 1);
        resetAuto();
      });

      // Power on after 10 seconds
      setTimeout(powerOn, 10000);
    })();
  </script>
</body>
</html>
