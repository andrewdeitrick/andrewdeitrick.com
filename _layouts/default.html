<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  {% if page.layout == 'post' or page.url contains '/blog' %}
  <link rel="stylesheet" href="/assets/css/blog.css">
  {% endif %}
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Andrew Deitrick",
    "url": "https://andrewdeitrick.com",
    "email": "andrew@andrewdeitrick.com",
    "jobTitle": "Software Engineer & AI Implementation Consultant",
    "description": "{{ site.description | strip_html | strip_newlines | escape }}"
  }
  </script>
</head>
<body>

  {% include nav.html %}

  <!-- TV Frame Overlay (desktop only) -->
  <div class="tv-frame-overlay" id="tv-frame-overlay">
    <img src="/assets/tv-frame.png" alt="">
  </div>

  <!-- TV Dial (desktop only) -->
  <div class="tv-dial" id="tv-dial">
    <img src="/assets/dial.png" alt="Channel dial">
  </div>

  <!-- TV Static Overlay -->
  <div class="tv-static-overlay" id="tv-static-overlay"></div>

  <!-- TV Channel Label -->
  <div class="tv-channel-label" id="tv-channel-label"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#x23FB;</button>

  <!-- CRT Scanlines -->
  <div class="crt-overlay"></div>

  <!-- Screen Content Area -->
  <div class="tv-screen-content" id="tv-screen-content">
    {{ content }}
  </div>

  {% include footer.html %}

  <script>
    // Position screen content to match TV frame's transparent opening
    (function() {
      const frameImg = document.querySelector('.tv-frame-overlay img');
      const screenContent = document.getElementById('tv-screen-content');
      const staticOverlay = document.getElementById('tv-static-overlay');
      const channelLabel = document.getElementById('tv-channel-label');
      const crtOverlay = document.querySelector('.crt-overlay');
      const dialEl = document.getElementById('tv-dial');

      if (!frameImg || !screenContent) return;

      // Screen opening position as % of the TV image's natural dimensions
      const SCREEN = { top: 5, left: 4, width: 69, height: 90 };
      // Dial position as % of the TV image
      const DIAL = { top: 22, left: 78, width: 12 };

      function updatePositions() {
        if (window.innerWidth < 1024) return;

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const imgRatio = frameImg.naturalWidth / frameImg.naturalHeight;
        const vpRatio = vw / vh;

        let renderW, renderH, offsetX, offsetY;

        if (vpRatio > imgRatio) {
          // Letterboxed on sides (image height fills viewport)
          renderH = vh;
          renderW = vh * imgRatio;
          offsetX = (vw - renderW) / 2;
          offsetY = 0;
        } else {
          // Letterboxed on top/bottom (image width fills viewport)
          renderW = vw;
          renderH = vw / imgRatio;
          offsetX = 0;
          offsetY = (vh - renderH) / 2;
        }

        const screenLeft = offsetX + (SCREEN.left / 100) * renderW;
        const screenTop = offsetY + (SCREEN.top / 100) * renderH;
        const screenWidth = (SCREEN.width / 100) * renderW;
        const screenHeight = (SCREEN.height / 100) * renderH;

        const style = (el) => {
          if (!el) return;
          el.style.left = screenLeft + 'px';
          el.style.top = screenTop + 'px';
          el.style.width = screenWidth + 'px';
          el.style.height = screenHeight + 'px';
        };

        style(screenContent);
        style(staticOverlay);
        if (crtOverlay) style(crtOverlay);

        if (channelLabel) {
          channelLabel.style.left = (screenLeft + 10) + 'px';
          channelLabel.style.top = (screenTop + 10) + 'px';
        }

        if (dialEl) {
          const dialLeft = offsetX + (DIAL.left / 100) * renderW;
          const dialTop = offsetY + (DIAL.top / 100) * renderH;
          const dialWidth = (DIAL.width / 100) * renderW;
          dialEl.style.left = dialLeft + 'px';
          dialEl.style.top = dialTop + 'px';
          dialEl.style.width = dialWidth + 'px';
          dialEl.style.right = 'auto';
        }
      }

      frameImg.addEventListener('load', updatePositions);
      window.addEventListener('resize', updatePositions);
      // Run immediately if already loaded
      if (frameImg.naturalWidth) updatePositions();
    })();

    // Theme toggle
    const toggle = document.querySelector('.theme-toggle');
    const root = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) root.setAttribute('data-theme', saved);

    toggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // TV Channel Navigation
    (function() {
      const channels = document.querySelectorAll('.channel');
      const dial = document.getElementById('tv-dial');
      const staticOverlay = document.getElementById('tv-static-overlay');
      const channelLabel = document.getElementById('tv-channel-label');

      if (!channels.length || !dial) return;

      let current = 0;
      let channelTimeout = null;
      let transitioning = false;

      function showChannel(index) {
        if (transitioning) return;
        if (index < 0) index = channels.length - 1;
        if (index >= channels.length) index = 0;
        if (index === current) return;

        transitioning = true;

        // Static flash
        staticOverlay.classList.remove('active');
        void staticOverlay.offsetWidth;
        staticOverlay.classList.add('active');

        // Swap content after brief static
        setTimeout(() => {
          channels[current].classList.remove('active');
          current = index;
          channels[current].classList.add('active');

          // Show channel label
          channelLabel.textContent = 'CH ' + (current + 1);
          channelLabel.classList.add('visible');
          clearTimeout(channelTimeout);
          channelTimeout = setTimeout(() => channelLabel.classList.remove('visible'), 2000);

          transitioning = false;
        }, 150);
      }

      // Dial click: left half = prev, right half = next
      dial.addEventListener('click', (e) => {
        const rect = dial.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const midpoint = rect.width / 2;

        if (clickX < midpoint) {
          showChannel(current - 1);
        } else {
          showChannel(current + 1);
        }
      });

      // Cursor changes based on which half you hover
      dial.addEventListener('mousemove', (e) => {
        const rect = dial.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const midpoint = rect.width / 2;

        if (clickX < midpoint) {
          dial.style.cursor = 'w-resize';
        } else {
          dial.style.cursor = 'e-resize';
        }
      });

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        // Only in TV mode (desktop)
        if (window.innerWidth < 1024) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          showChannel(current + 1);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          showChannel(current - 1);
        }
      });
    })();
  </script>
</body>
</html>
